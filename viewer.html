<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JMCY Reader</title>

<style>

:root{
--bg:#0b0d10;
--card:#161921;
--accent:#9b59b6;
--text:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* NAVBAR */

nav{
background:var(--card);
padding:12px 5%;
display:flex;
justify-content:space-between;
border-bottom:2px solid #1e293b;
}

.logo{
font-size:1.4rem;
font-weight:800;
text-decoration:none;
color:white;
}

.logo span{
color:var(--accent);
}

/* READER */

.reader{
max-width:900px;
margin:auto;
padding:20px;
}

.page{
margin-bottom:12px;
display:flex;
justify-content:center;
}

.page img{
width:100%;
max-width:900px;
border-radius:6px;
background:#111;
min-height:300px;
}

/* LOADING */

.loading{
text-align:center;
padding:50px;
}

</style>

</head>

<body>

<nav>
<a href="index.html" class="logo">JMCY<span>READER</span></a>
</nav>

<div class="reader">

<div id="pages">

<div class="loading">
Loading chapter...
</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const chapterId = params.get("id");

const container = document.getElementById("pages");

let pageList = [];
let base = "";
let hash = "";

/* LOAD CHAPTER */

async function loadChapter(){

try{

const res = await fetch(
`https://api.mangadex.org/at-home/server/${chapterId}`
);

const data = await res.json();

base = data.baseUrl;
hash = data.chapter.hash;
pageList = data.chapter.data;

container.innerHTML="";

/* CREATE PLACEHOLDERS */

pageList.forEach((p,i)=>{

const div=document.createElement("div");
div.className="page";

const img=document.createElement("img");

img.dataset.page=p;
img.dataset.index=i;

div.appendChild(img);
container.appendChild(div);

});

/* START OBSERVER */

startLazyLoading();

}

catch(e){

container.innerHTML=
"<div class='loading'>Failed to load chapter</div>";

}

}

/* LAZY LOADING */

function startLazyLoading(){

const images=document.querySelectorAll("img");

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

const img=entry.target;
const page=img.dataset.page;

/* FAST DATA SAVER */

img.src=`${base}/data-saver/${hash}/${page}`;

/* FALLBACK FULL IMAGE */

img.onerror=()=>{
img.src=`${base}/data/${hash}/${page}`;
};

img.decoding="async";
img.loading="lazy";

observer.unobserve(img);

}

});

},{
rootMargin:"500px"
});

images.forEach(img=>{
observer.observe(img);
});

}

/* START */

loadChapter();

</script>

</body>
</html>
