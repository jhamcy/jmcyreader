<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Reader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-text">
                <span class="rating">⭐ 9.6</span>
                <h1>RAISING VILLAINS THE RI...</h1>
                <p class="genres">Action, Adventure, Comedy...</p>
                <div class="summary">
                    <strong>SUMMARY</strong>
                    <p>[By the studio that brought you...]</p>
                </div>
                <p class="status">Status: Ongoing</p>
            </div>
            <img src="featured-cover.jpg" alt="Cover" class="hero-img">
        </div>
        <div class="carousel-dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            </div>
    </section>

    <main class="container">
        <h2>Popular Today</h2>
        <div class="card-grid">
            <div class="card">
                <div class="img-container">
                    <img src="sword-sense.jpg" alt="Absolute Sword Sense">
                    <span class="badge">MANHWA</span>
                </div>
                <h3>Absolute Sword Sense</h3>
                <p class="chapter">Chapter 174</p>
                <p class="card-rating">⭐⭐⭐⭐⭐ 9.6</p>
            </div>
            <div class="card">
                <div class="img-container">
                    <img src="swordmaster.jpg" alt="Swordmaster">
                    <span class="badge">MANHWA</span>
                </div>
                <h3>Swordmaster's Youngest Son</h3>
                <p class="chapter">Chapter 201</p>
                <p class="card-rating">⭐⭐⭐⭐⭐ 9.5</p>
            </div>
        </div>
    </main>

</body>
</html>
