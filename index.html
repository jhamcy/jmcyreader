<!DOCTYPE html>
<html>

<head>

<title>JMCY Reader PRO</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>

<a class="logo">JMCY<span>READER</span></a>

</nav>

<div class="container">

<input class="search" id="searchBox" placeholder="Search manga...">

<div class="section-title">Search Results</div>
<div class="grid" id="searchResults"></div>

<div class="section-title">Trending Manga</div>
<div class="grid" id="trending"></div>

<div class="section-title">My Library</div>
<div class="grid" id="library"></div>

</div>

<script src="app.js"></script>

<script>

loadTrending()
loadLibrary()

document.getElementById("searchBox").addEventListener("input",e=>{

if(e.target.value.length>2){
searchManga(e.target.value)
}

})

</script>

</body>

</html>
