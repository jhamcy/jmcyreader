<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMCY Reader | Free Manhwa</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0b0d10;
            --card: #161921;
            --accent: #9b59b6;
            --text: #ffffff;
            --muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }

        /* Navbar */
        nav {
            background: var(--card);
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e293b;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 800; text-decoration: none; color: white; }
        .logo span { color: var(--accent); }

        .search-container { position: relative; width: 250px; }
        .search-input {
            width: 100%; background: #0b0d10; border: 1px solid #334155;
            color: white; padding: 8px 15px; border-radius: 6px; outline: none;
        }

        /* Layout Grid */
        .wrapper {
            max-width: 1200px; margin: 20px auto; padding: 0 20px;
            display: grid; grid-template-columns: 1fr 300px; gap: 25px;
        }

        .section-title {
            border-left: 4px solid var(--accent);
            padding-left: 10px; margin: 20px 0; font-weight: 800; text-transform: uppercase;
        }

        .manga-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px;
        }

        .manga-card {
            background: var(--card); border-radius: 6px; overflow: hidden;
            transition: 0.3s; cursor: pointer; border: 1px solid transparent;
        }
        .manga-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .manga-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .manga-info { padding: 10px; font-size: 0.85rem; }

        /* Sidebar Ads & Popular */
        .sidebar-box { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 20px; }

        footer { 
            margin-top: 50px; padding: 40px; background: var(--card); 
            text-align: center; border-top: 1px solid #1e293b; 
        }

        @media (max-width: 850px) {
            .wrapper { grid-template-columns: 1fr; }
            .search-container { width: 100%; margin-top: 10px; }
            nav { flex-direction: column; height: auto; padding: 15px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">JMCY<span>READER</span></a>
        <div class="search-container">
            <input type="text" id="manga-search" class="search-input" placeholder="Search and read free...">
        </div>
        <div style="display: flex; gap: 15px; color: var(--muted); cursor: pointer;">
            <i data-lucide="bell"></i>
            <i data-lucide="bookmark"></i>
        </div>
    </nav>

    <div class="wrapper">
        <main>
            <div style="margin-bottom: 20px;">
                <script async="async" data-cfasync="false" src="https://spreadpreferencetelevision.com/4c0ed34fba63006187eb212da78a33af/invoke.js"></script>
                <div id="container-4c0ed34fba63006187eb212da78a33af"></div>
            </div>

            <h2 class="section-title">Latest Updates</h2>
            <div class="manga-grid" id="manga-list">
                </div>
        </main>

        <aside>
            <div class="sidebar-box">
                <div style="margin-bottom: 10px; font-weight: bold; color: var(--accent); font-size: 0.7rem;">SPONSORED</div>
                <script async="async" data-cfasync="false" src="https://spreadpreferencetelevision.com/4c0ed34fba63006187eb212da78a33af/invoke.js"></script>
                <div id="container-4c0ed34fba63006187eb212da78a33af"></div>
            </div>

            <div class="sidebar-box">
                <h3 style="margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 5px; font-size: 1rem;">Popular Today</h3>
                <div style="font-size: 0.85rem; color: var(--muted);">
                    <p style="margin-bottom: 10px;">1. Solo Leveling</p>
                    <p style="margin-bottom: 10px;">2. Nano Machine</p>
                    <p>3. Mercenary Enrollment</p>
                </div>
            </div>
        </aside>
    </div>

    <footer>
        <p style="font-size: 0.8rem; color: var(--muted); max-width: 600px; margin: 0 auto;">
            <strong>Disclaimer:</strong> JMCY Reader is a custom client using the MangaDex API. We do not host any copyrighted material.
        </p>
        <p style="margin-top: 20px; font-size: 0.75rem;">&copy; 2026 JMCY Web Solutions</p>
    </footer>

    <script src="https://spreadpreferencetelevision.com/86/8d/1e/868d1eaa7d5b69adc9f351c0b95fb6f5.js"></script>

    <script>
        async function fetchLatest() {
            const list = document.getElementById('manga-list');
            try {
                const res = await fetch('https://api.mangadex.org/manga?limit=10&contentRating[]=safe&includes[]=cover_art');
                const data = await res.json();
                
                list.innerHTML = '';
                data.data.forEach(manga => {
                    const title = manga.attributes.title.en || "Untitled";
                    const cover = manga.relationships.find(r => r.type === 'cover_art');
                    const coverImg = cover ? `https://uploads.mangadex.org/covers/${manga.id}/${cover.attributes.fileName}.256.jpg` : 'https://via.placeholder.com/200x300';
                    
                    const card = document.createElement('div');
                    card.className = 'manga-card';
                    card.innerHTML = `
                        <img src="${coverImg}">
                        <div class="manga-info">
                            <div style="font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${title}</div>
                            <div style="color: var(--muted); font-size: 0.75rem;">View Series</div>
                        </div>
                    `;
                    card.onclick = () => window.location.href = `reader.html?id=${manga.id}`;
                    list.appendChild(card);
                });
            } catch (err) {
                list.innerHTML = 'Error loading latest updates.';
            }
        }

        fetchLatest();
        lucide.createIcons();
    </script>
</body>
</html>
