<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMCY Reader | Reading</title>
    <style>
        :root { --bg: #0b0d10; --card: #161921; --accent: #9b59b6; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .chapter-list { display: flex; flex-direction: column; gap: 10px; max-width: 800px; margin: 0 auto; }
        .chapter-item { background: var(--card); padding: 15px; border-radius: 8px; text-decoration: none; color: white; border: 1px solid #333; }
        .chapter-item:hover { border-color: var(--accent); }
    </style>
</head>
<body>
    <h1 id="manga-title" style="text-align: center; margin-bottom: 30px;">Loading Chapters...</h1>
    <div class="chapter-list" id="chapter-list"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const mangaId = params.get('id');
        const proxy = "https://api.allorigins.win/get?url=";

        async function loadChapters() {
            if (!mangaId) return;
            try {
                // Fetching the last 50 English chapters
                const url = `https://api.mangadex.org/manga/${mangaId}/feed?limit=50&translatedLanguage[]=en&order[chapter]=desc`;
                const response = await fetch(proxy + encodeURIComponent(url));
                const outerData = await response.json();
                const result = JSON.parse(outerData.contents);

                const list = document.getElementById('chapter-list');
                list.innerHTML = '';
                
                result.data.forEach(chapter => {
                    const num = chapter.attributes.chapter;
                    const title = chapter.attributes.title || `Chapter ${num}`;
                    const item = document.createElement('a');
                    item.className = 'chapter-item';
                    item.href = `view.html?id=${chapter.id}`; // Next step: The actual image viewer
                    item.innerText = `Chapter ${num}: ${title}`;
                    list.appendChild(item);
                });
                
                document.getElementById('manga-title').innerText = "Chapters Available";
            } catch (e) {
                document.getElementById('manga-title').innerText = "Error Loading Chapters";
            }
        }

        loadChapters();
    </script>
</body>
</html>
