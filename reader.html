<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMCY Reader | Manga</title>

<style>

:root{
--bg:#0b0d10;
--card:#161921;
--accent:#9b59b6;
--text:#ffffff;
--muted:#94a3b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* NAV */

nav{
background:var(--card);
padding:12px 5%;
border-bottom:2px solid #1e293b;
}

.logo{
font-size:1.5rem;
font-weight:800;
text-decoration:none;
color:white;
}

.logo span{
color:var(--accent);
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* MANGA HEADER */

.manga-header{
display:flex;
gap:20px;
background:var(--card);
padding:20px;
border-radius:8px;
margin-bottom:20px;
flex-wrap:wrap;
}

.manga-header img{
width:180px;
border-radius:6px;
aspect-ratio:2/3;
object-fit:cover;
}

.manga-details h1{
margin-bottom:10px;
color:var(--accent);
}

.manga-details p{
font-size:0.9rem;
color:var(--muted);
display:-webkit-box;
-webkit-line-clamp:5;
-webkit-box-orient:vertical;
overflow:hidden;
}

/* CONTINUE BUTTON */

#continueBtn{
margin:10px 0 20px;
padding:10px 15px;
background:var(--accent);
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* CHAPTER LIST */

.chapter-list{
background:var(--card);
border-radius:8px;
overflow:hidden;
}

.chapter-item{
display:flex;
justify-content:space-between;
padding:15px 20px;
border-bottom:1px solid #1e293b;
cursor:pointer;
transition:0.2s;
}

.chapter-item:hover{
background:#1e293b;
color:var(--accent);
}

.chapter-item:last-child{
border-bottom:none;
}

.loading{
text-align:center;
padding:50px;
color:#aaa;
}

@media(max-width:600px){
.manga-header{flex-direction:column;align-items:center;text-align:center;}
.manga-header img{width:150px;}
}

</style>
</head>

<body>

<nav>
<a href="index.html" class="logo">JMCY<span>READER</span></a>
</nav>

<div class="container" id="main-content">

<div class="loading">Fetching manga data...</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const mangaId = params.get("id")
const container = document.getElementById("main-content")

if(!mangaId){
container.innerHTML="<h1>No manga selected</h1>"
}

async function fetchWithProxy(url){
const proxy="https://corsproxy.io/?"+encodeURIComponent(url)
const res = await fetch(proxy)
const data = await res.json()
return data.contents ? JSON.parse(data.contents) : data
}

async function loadManga(){

try{

/* FETCH MANGA DETAILS */
const mangaUrl = `https://api.mangadex.org/manga/${mangaId}?includes[]=cover_art`
const feedUrl  = `https://api.mangadex.org/manga/${mangaId}/feed?translatedLanguage[]=en&order[chapter]=desc&limit=50`

const [manga, feed] = await Promise.all([
fetchWithProxy(mangaUrl),
fetchWithProxy(feedUrl)
])

const mangaData = manga.data
const feedData = feed.data

/* MANGA INFO */
const title = mangaData.attributes.title.en || Object.values(mangaData.attributes.title)[0] || "Untitled"
const desc = mangaData.attributes.description.en || "No description available."
const coverRel = mangaData.relationships.find(r=>r.type==="cover_art")
const cover = coverRel ? `https://uploads.mangadex.org/covers/${mangaId}/${coverRel.attributes.fileName}.256.jpg` : 'https://via.placeholder.com/250x350'

/* BUILD HEADER */
container.innerHTML=`
<div class="manga-header">
<img src="${cover}" alt="${title}">
<div class="manga-details">
<h1>${title}</h1>
<p>${desc}</p>
</div>
</div>

<button id="continueBtn">Continue Reading</button>

<div class="chapter-list" id="chapters"></div>
`

const chapterContainer = document.getElementById("chapters")

/* CONTINUE READING */
const last = localStorage.getItem("reading_"+mangaId)
const continueBtn = document.getElementById("continueBtn")

if(last){
continueBtn.onclick = ()=> window.location=`viewer.html?id=${last}&manga=${mangaId}`
}else{
continueBtn.style.display="none"
}

/* CHAPTER LIST */
if(feedData.length===0){
chapterContainer.innerHTML="<div style='padding:20px'>No English chapters found.</div>"
return
}

feedData.forEach(chap=>{
const cNum = chap.attributes.chapter || "?"
const cTitle = chap.attributes.title || `Chapter ${cNum}`

const item = document.createElement("div")
item.className="chapter-item"
item.innerHTML=`
<span>Chapter ${cNum}</span>
<span style="color:var(--muted); font-size:0.8rem">${cTitle}</span>
`
item.onclick = ()=>{
localStorage.setItem("reading_"+mangaId, chap.id)
window.location=`viewer.html?id=${chap.id}&manga=${mangaId}`
}
chapterContainer.appendChild(item)
})

}catch(err){
container.innerHTML=`<div class="loading"><h1>Error loading manga</h1><p>${err.message}</p></div>`
}

}

loadManga()

</script>

</body>
</html>
