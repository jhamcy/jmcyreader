<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>JMCY Reader | Reading</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root{
--bg:#0b0d10;
--card:#161921;
--accent:#9b59b6;
--text:#ffffff;
--muted:#94a3b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
line-height:1.6;
}

/* NAVBAR */

nav{
background:var(--card);
padding:10px 5%;
display:flex;
justify-content:space-between;
border-bottom:2px solid #1e293b;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:1.5rem;
font-weight:800;
text-decoration:none;
color:white;
}

.logo span{
color:var(--accent);
}

/* CONTAINER */

.container{
max-width:900px;
margin:20px auto;
padding:0 20px;
}

/* HEADER */

.manga-header{
display:flex;
gap:20px;
background:var(--card);
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

.manga-header img{
width:180px;
border-radius:6px;
aspect-ratio:2/3;
object-fit:cover;
}

.manga-details h1{
margin-bottom:10px;
color:var(--accent);
}

.manga-details p{
font-size:0.9rem;
color:var(--muted);
display:-webkit-box;
-webkit-line-clamp:5;
-webkit-box-orient:vertical;
overflow:hidden;
}

/* CHAPTER LIST */

.chapter-list{
background:var(--card);
border-radius:8px;
overflow:hidden;
}

.chapter-item{
display:flex;
justify-content:space-between;
padding:15px 20px;
border-bottom:1px solid #1e293b;
cursor:pointer;
transition:0.2s;
}

.chapter-item:hover{
background:#1e293b;
color:var(--accent);
}

.chapter-item:last-child{
border:none;
}

#loading-state{
text-align:center;
padding:50px;
font-weight:bold;
}

/* MOBILE */

@media(max-width:600px){

.manga-header{
flex-direction:column;
align-items:center;
text-align:center;
}

.manga-header img{
width:150px;
}

}

</style>
</head>

<body>

<nav>
<a href="index.html" class="logo">JMCY<span>READER</span></a>
</nav>

<div class="container" id="main-content">
<div id="loading-state">FETCHING MANGA DATA...</div>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const mangaId = params.get("id");
const container = document.getElementById("main-content");

async function loadManga(){

if(!mangaId){
container.innerHTML="<h1>No Manga Selected</h1>";
return;
}

try{

/* FETCH DATA DIRECTLY FROM MANGADEX */

const mangaRes = await fetch(
`https://api.mangadex.org/manga/${mangaId}?includes[]=cover_art`
);

const feedRes = await fetch(
`https://api.mangadex.org/manga/${mangaId}/feed?translatedLanguage[]=en&order[chapter]=desc&limit=100`
);

const manga = await mangaRes.json();
const feed = await feedRes.json();

/* TITLE */

const title =
manga.data.attributes.title.en ||
Object.values(manga.data.attributes.title)[0] ||
"Untitled";

/* DESCRIPTION */

const desc =
manga.data.attributes.description.en ||
"No description available.";

/* COVER */

const coverRel =
manga.data.relationships.find(r=>r.type==="cover_art");

let fileName = null;

if(coverRel && coverRel.attributes){
fileName = coverRel.attributes.fileName;
}

let coverUrl="https://via.placeholder.com/250x350";

if(fileName){
coverUrl=
`https://uploads.mangadex.org/covers/${mangaId}/${fileName}.256.jpg`;
}

/* BUILD UI */

container.innerHTML=`

<div class="manga-header">

<img src="${coverUrl}" alt="${title}"
onerror="this.src='https://via.placeholder.com/250x350'">

<div class="manga-details">
<h1>${title}</h1>
<p>${desc}</p>
</div>

</div>

<div class="chapter-list" id="chapters"></div>

`;

const chapterContainer =
document.getElementById("chapters");

/* NO CHAPTERS */

if(!feed.data || feed.data.length===0){

chapterContainer.innerHTML=
"<div style='padding:20px'>No English chapters found.</div>";

return;

}

/* CREATE CHAPTER LIST */

feed.data.forEach(chap=>{

const cNum =
chap.attributes.chapter || "?";

const cTitle =
chap.attributes.title ||
`Chapter ${cNum}`;

const item=document.createElement("div");

item.className="chapter-item";

item.innerHTML=`

<span>Chapter ${cNum}</span>

<span style="color:var(--muted);font-size:0.8rem">
${cTitle}
</span>

`;

item.onclick=()=>{

window.location.href=`viewer.html?id=${chap.id}`;

};

chapterContainer.appendChild(item);

});

}

catch(err){

container.innerHTML=`
<div style="text-align:center">

<h1>Error loading chapters</h1>
<p>${err.message}</p>

</div>
`;

}

}

loadManga();

</script>

</body>
</html>
