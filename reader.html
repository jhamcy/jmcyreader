<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>JMCY Reader</title>

<style>
:root{
--bg:#0b0d10;
--card:#161921;
--accent:#9b59b6;
--text:#ffffff;
--muted:#94a3b8;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* NAV */
nav{
background:var(--card);
padding:12px 5%;
border-bottom:2px solid #1e293b;
}

.logo{
font-size:1.4rem;
font-weight:800;
text-decoration:none;
color:white;
}

.logo span{
color:var(--accent);
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* HEADER */
.manga-header{
display:flex;
gap:20px;
background:var(--card);
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

.manga-header img{
width:160px;
border-radius:6px;
background:#222;
}

/* CHAPTER LIST */
.chapter-list{
background:var(--card);
border-radius:8px;
overflow:hidden;
}

.chapter{
padding:15px 20px;
border-bottom:1px solid #1e293b;
cursor:pointer;
display: flex;
justify-content: space-between;
}

.chapter:hover{
background:#1e293b;
color: var(--accent);
}

.loading{
text-align:center;
padding:50px;
}
</style>
</head>

<body>

<nav>
<a href="index.html" class="logo">JMCY<span>READER</span></a>
</nav>

<div class="container" id="app">
<div class="loading" id="status">Loading manga...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const mangaId = params.get("id");
const app = document.getElementById("app");

/* PROXY LIST - Same as index.html */
const proxies = [
    url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`
];

async function fetchWithRetry(url) {
    for (const proxy of proxies) {
        try {
            const res = await fetch(proxy(url));
            if (!res.ok) throw new Error();
            const data = await res.json();
            return data.contents ? JSON.parse(data.contents) : data;
        } catch (e) {
            console.log("Switching proxy...");
        }
    }
    throw new Error("Failed to fetch from all sources");
}

async function loadManga() {
    if (!mangaId) {
        app.innerHTML = '<div class="loading"><h1>No Manga ID provided</h1></div>';
        return;
    }

    try {
        // Fetch Manga Details & Chapter Feed
        const [mangaData, feedData] = await Promise.all([
            fetchWithRetry(`https://api.mangadex.org/manga/${mangaId}?includes[]=cover_art`),
            fetchWithRetry(`https://api.mangadex.org/manga/${mangaId}/feed?translatedLanguage[]=en&order[chapter]=desc&limit=100&contentRating[]=safe&contentRating[]=suggestive`)
        ]);

        const attr = mangaData.data.attributes;
        const title = attr.title.en || Object.values(attr.title)[0] || "Untitled";
        const desc = attr.description.en || "No description provided.";

        // Find Cover
        const coverRel = mangaData.data.relationships.find(r => r.type === "cover_art");
        const fileName = coverRel ? coverRel.attributes.fileName : null;
        const coverUrl = fileName 
            ? `https://uploads.mangadex.org/covers/${mangaId}/${fileName}.256.jpg`
            : 'https://via.placeholder.com/250x350';

        /* BUILD UI */
        app.innerHTML = `
            <div class="manga-header">
                <img src="${coverUrl}" alt="${title}">
                <div>
                    <h1>${title}</h1>
                    <p style="color:var(--muted);font-size:14px;margin-top:10px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;">
                        ${desc}
                    </p>
                </div>
            </div>
            <div class="chapter-list" id="chapters"></div>
        `;

        const chapterBox = document.getElementById("chapters");

        if (feedData.data.length === 0) {
            chapterBox.innerHTML = '<div class="chapter">No English chapters available.</div>';
            return;
        }

        feedData.data.forEach(ch => {
            const num = ch.attributes.chapter || "?";
            const chTitle = ch.attributes.title ? ` - ${ch.attributes.title}` : "";
            const div = document.createElement("div");
            div.className = "chapter";
            div.innerHTML = `<span>Chapter ${num}</span> <span style="font-size:12px; opacity:0.6">${chTitle}</span>`;
            
            div.onclick = () => {
                window.location = `viewer.html?id=${ch.id}&manga=${mangaId}`;
            };
            chapterBox.appendChild(div);
        });

    } catch (e) {
        app.innerHTML = `
            <div class="loading">
                <h1>Error loading chapters</h1>
                <p>${e.message}. Please try refreshing.</p>
            </div>
        `;
    }
}

loadManga();
</script>

</body>
</html>
