<!DOCTYPE html>
<html>

<head>

<title>Manga</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>
<a href="index.html" class="logo">JMCY<span>READER</span></a>
</nav>

<div class="container" id="main"></div>

<script src="app.js"></script>

<script>

const id=new URLSearchParams(location.search).get("id")

async function load(){

const manga=await fetchAPI(`https://api.mangadex.org/manga/${id}?includes[]=cover_art`)
const feed=await fetchAPI(`https://api.mangadex.org/manga/${id}/feed?translatedLanguage[]=en&limit=100`)

const data=manga.data

const title=data.attributes.title.en || Object.values(data.attributes.title)[0]

const coverRel=data.relationships.find(r=>r.type==="cover_art")

const cover=`https://uploads.mangadex.org/covers/${id}/${coverRel.attributes.fileName}.256.jpg`

document.getElementById("main").innerHTML=`

<img src="${cover}" width="200">

<h1>${title}</h1>

<button onclick="saveBookmark('${id}','${title}','${cover}')">Bookmark</button>

<h2>Chapters</h2>

<div id="chapters"></div>

`

const c=document.getElementById("chapters")

feed.data.forEach(ch=>{

const div=document.createElement("div")

div.className="chapter"

div.innerText="Chapter "+(ch.attributes.chapter||"?")

div.onclick=()=>{
location=`viewer.html?id=${ch.id}&manga=${id}`
}

c.appendChild(div)

})

}

load()

</script>

</body>

</html>
